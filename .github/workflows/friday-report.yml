name: Friday Telegram Report
 
on:
  schedule:
    - cron: "30 6 * * 5" # 09:30 Israel summer time, Fridays
  workflow_dispatch:
 
jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet google-auth google-api-python-client requests
      - run: python scripts/send_dashboard.py
        env:
          MONEYMAN_CONFIG: ${{ secrets.MONEYMAN_CONFIG }}
